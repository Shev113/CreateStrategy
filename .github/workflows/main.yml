name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify core imports
        run: |
          python -c "from backtest.engine import BacktestEngine; from strategy.config import get_strategy_names; from intraday.engine import IntradayEngine"

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v
